<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="site.webmanifest" />
    <meta name="theme-color" content="#2563eb" />
    <title>Reset password - Traffic AI</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/bootstrap-bridge.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="min-vh-100 d-flex align-items-center justify-content-center p-3">
      <div class="card auth-card shadow-sm border-0 w-100">
        <div class="card-body p-4">
          <div class="d-flex justify-content-end mb-3">
            <select data-lang-switch class="form-select form-select-sm site-lang-select" aria-label="Language">
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </div>
          <h2 class="h4 mb-2" data-i18n="auth.resetTitle">重置密码</h2>
          <p class="muted mb-4" data-i18n="auth.resetDesc">输入邮箱并获取验证码，验证后即可设置新密码。</p>
          <form id="resetPasswordForm" class="grid">
            <div>
              <label for="email" data-i18n="auth.email">邮箱</label>
              <input id="email" type="email" autocomplete="email" required />
            </div>
            <div>
              <label for="verifyCode" data-i18n="auth.verifyCode">邮箱验证码</label>
              <div class="d-flex gap-2 align-items-stretch flex-wrap">
                <input
                  id="verifyCode"
                  class="flex-grow-1"
                  type="text"
                  inputmode="numeric"
                  autocomplete="one-time-code"
                  required
                  minlength="6"
                  maxlength="6"
                  pattern="[0-9]{6}"
                />
                <button
                  type="button"
                  id="sendResetCodeBtn"
                  class="btn btn-outline-primary auth-send-code-btn"
                  data-i18n="auth.sendCode"
                >
                  发送验证码
                </button>
              </div>
            </div>
            <div>
              <label for="newPassword" data-i18n="auth.newPasswordRule">新密码（至少8位）</label>
              <input id="newPassword" type="password" autocomplete="new-password" required minlength="8" maxlength="64" />
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2" data-i18n="auth.resetBtn">重置密码</button>
            <div id="msg" class="msg"></div>
          </form>
          <p class="muted mb-0 mt-3 small">
            <a href="/login.html" data-i18n="auth.backToLogin">返回登录</a>
          </p>
        </div>
      </div>
    </div>
    <script src="js/i18n.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/auth.js"></script>
  </body>
</html>
