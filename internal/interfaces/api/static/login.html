<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="site.webmanifest" />
    <meta name="theme-color" content="#2563eb" />
    <title>Login - Traffic AI</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/bootstrap-bridge.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="min-vh-100 d-flex align-items-center justify-content-center p-3">
      <div class="card auth-card shadow-sm border-0 w-100">
        <div class="card-body p-4">
          <div class="d-flex justify-content-end mb-3">
            <select data-lang-switch class="form-select form-select-sm site-lang-select" aria-label="Language">
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </div>
          <h2 class="h4 mb-2" data-i18n="auth.loginTitle">登录 Traffic AI</h2>
          <p class="muted mb-4" data-i18n="auth.welcome">欢迎回来，登录后可管理令牌、余额与日志。</p>
          <form id="loginForm" class="grid">
            <div>
              <label for="email" data-i18n="auth.email">邮箱</label>
              <input id="email" type="email" required />
            </div>
            <div>
              <label for="password" data-i18n="auth.password">密码</label>
              <input id="password" type="password" required />
            </div>
            <div class="d-flex justify-content-end">
              <a href="/reset-password.html" class="small" data-i18n="auth.forgotPassword">忘记密码？</a>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2" data-i18n="auth.loginBtn">登录</button>
            <div id="msg" class="msg"></div>
          </form>
          <p class="muted mb-0 mt-3 small">
            <span data-i18n="auth.noAccount">没有账户？</span> <a href="/register.html" data-i18n="auth.register">注册</a>
          </p>
        </div>
      </div>
    </div>
    <script src="js/i18n.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/auth.js"></script>
  </body>
</html>
